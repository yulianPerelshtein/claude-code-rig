name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install ruff
        run: uv tool install ruff
      - name: Run ruff
        run: |
          # Skip if no Python files exist yet.
          if find . -name '*.py' -not -path './.git/*' -print -quit | grep -q .; then
            ruff check .
          else
            echo "No Python files yet; skipping ruff."
          fi

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          # Skip if no shell files exist yet.
          shopt -s globstar nullglob
          shells=( **/*.sh )
          if [ ${#shells[@]} -eq 0 ]; then
            echo "No shell scripts yet; skipping shellcheck."
            exit 0
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck --severity=warning "${shells[@]}"

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.43.0
      - name: Run markdownlint
        run: markdownlint --config .markdownlint.json '**/*.md' --ignore node_modules

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: |
          yamllint -d 'relaxed' .

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run pytest
        # --with pytest so a clean runner has the test runner itself (the repo
        # declares no [project] deps); --with pyyaml so the routines registry +
        # installer-vocab tests resolve. The repo-map grammar-gated integration
        # test self-skips without parsers.
        run: uv run --with pytest --with pyyaml pytest tests/ -v
