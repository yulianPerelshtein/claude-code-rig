name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'      # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/
          gitleaks version
      - name: Run gitleaks
        run: |
          gitleaks detect --source . --redact --verbose --no-banner

  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install trufflehog
        run: |
          curl -sSL -o /tmp/trufflehog.tar.gz \
            https://github.com/trufflesecurity/trufflehog/releases/download/v3.95.6/trufflehog_3.95.6_linux_amd64.tar.gz
          tar -xzf /tmp/trufflehog.tar.gz -C /tmp trufflehog
          sudo mv /tmp/trufflehog /usr/local/bin/
          trufflehog --version
      - name: Run trufflehog
        run: |
          trufflehog filesystem . --no-update --only-verified --fail

  redaction-pattern-blocklist:
    name: redaction-pattern-blocklist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Provide private marker list (if configured)
        # The real codenames live in the REDACTION_PATTERNS secret, never in the
        # repo. Write it to the gitignored local path the script prefers. If the
        # secret is unset (e.g. a fork), the script falls back to the template
        # and the marker scan is best-effort; the key scan still runs.
        env:
          REDACTION_PATTERNS: ${{ secrets.REDACTION_PATTERNS }}
        run: |
          if [ -n "$REDACTION_PATTERNS" ]; then
            printf '%s\n' "$REDACTION_PATTERNS" > tools/scripts/redaction-patterns.local.txt
            echo "Loaded private marker list from secret."
          else
            echo "REDACTION_PATTERNS secret not set — using template (best-effort)."
          fi
      - name: Make script executable
        run: chmod +x .github/scripts/check-redactions.sh
      - name: Run blocklist regex
        run: .github/scripts/check-redactions.sh

  policy-summary:
    name: policy-summary
    needs: [gitleaks, trufflehog, redaction-pattern-blocklist]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All three secret-scan gates passed."
