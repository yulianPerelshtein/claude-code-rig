name: plugin-validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: plugin-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugin-validate:
    name: plugin-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate plugin + marketplace manifests and SKILL.md frontmatter
        run: python3 .github/scripts/validate-plugin.py
